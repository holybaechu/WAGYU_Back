spring.application.name=WAGYU_Back
spring.config.import=optional:file:.env[.properties]

server.port=${PORT}

spring.datasource.url=jdbc:mysql://${MYSQL_HOST}:${MYSQL_PORT}/${MYSQL_DB_NAME}
spring.datasource.username=${MYSQL_USERNAME}
spring.datasource.password=${MYSQL_PASSWORD}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

spring.jwt.secret=${JWT_SECRET_KEY}
app.cors.allowed-origin-patterns=${CORS_ALLOWED_ORIGIN_PATTERNS:http://localhost:[*],http://127.0.0.1:[*],http://10.*.*.*:[*],http://172.*.*.*:[*],http://192.168.*.*:[*],http://100.*.*.*:[*]}
